    // ── CSV parser (handles RFC-4180 quoted fields) ─────────────
    function parseCSV(text) {
      const rows = [];
      let row = [], field = '', inQ = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQ) {
          if (c === '"') {
            if (text[i + 1] === '"') { field += '"'; i++; }
            else inQ = false;
          } else {
            field += c;
          }
        } else if (c === '"') {
          inQ = true;
        } else if (c === ',') {
          row.push(field); field = '';
        } else if (c === '\n') {
          row.push(field); field = '';
          rows.push(row); row = [];
        } else if (c !== '\r') {
          field += c;
        }
      }
      row.push(field);
      if (row.some(f => f !== '')) rows.push(row);
      return rows;
    }

    function buildOrders() {
      const rows = parseCSV(CSV);
      const log = [];
      const adjustments = [];

      // Find player name row and ready row
      const playerRow  = rows.find(r => r[1]?.includes('parcelled'));
      const readyRow   = rows.find(r => r[1]?.includes('finished ordering'));
      if (!playerRow || !readyRow) throw new Error('Could not find player/ready rows in CSV');

      // Players start at column index 3
      const players = [];
      for (let i = 3; i < playerRow.length; i++) {
        const name = playerRow[i].trim();
        if (!name) break;
        const ready = readyRow[i]?.trim().toUpperCase() === 'TRUE';
        players.push({ name, ready, idx: i });
      }

      log.push(`Found ${players.length} players. Ready: ${players.filter(p => p.ready).length}`);
      players.filter(p => !p.ready).forEach(p => log.push(`  ⚠ SKIPPING ${p.name} (not ready)`));

      // Initialize per-player potion arrays
      const orders = {};
      players.filter(p => p.ready).forEach(p => { orders[p.name] = []; });

      // Find and process each potion row
      for (const row of rows) {
        const rawName = (row[1] ?? '').trim();
        if (!rawName) continue;

        // Strip suffixes like " [2 Max]" from the name for lookup
        const lookupName = rawName.replace(/\s*\[.*?\]/g, '').trim();
        const rule = RULES_MAP.get(lookupName);
        if (!rule) continue;

        players.filter(p => p.ready).forEach(p => {
          const raw = parseInt(row[p.idx] ?? '0', 10) || 0;
          if (raw === 0) return;
          const stacks = Math.min(raw, rule.max);
          if (stacks !== raw) {
            adjustments.push(`  ✂ ${p.name} — ${rule.canonical}: ${raw} → ${stacks} (max ${rule.max})`);
          }
          orders[p.name].push({ name: rule.canonical, stacks });
        });
      }

      if (adjustments.length) {
        log.push(`\nAdjusted ${adjustments.length} over-max quantities:`);
        adjustments.forEach(a => log.push(a));
      }

      // Filter out players with zero items
      const result = Object.entries(orders)
        .filter(([, potions]) => potions.length > 0)
        .map(([playerName, potions]) => ({ playerName, potions }));

      log.push(`\n${result.length} orders to import:`);
      result.forEach(o => {
        const total = o.potions.reduce((s, p) => s + p.stacks, 0);
        log.push(`  ${o.playerName}: ${o.potions.length} lines, ${total} total stacks`);
      });

      return { orders: result, log };
    }

    // ── UI ─────────────────────────────────────────────────────
    const logEl = document.getElementById('log');
    function appendLog(msg, cls = '') {
      const span = document.createElement('span');
      if (cls) span.className = cls;
      span.textContent = msg + '\n';
      logEl.appendChild(span);
    }

    async function run(dryRun) {
      logEl.innerHTML = '';
      appendLog(`=== ${dryRun ? 'DRY RUN' : 'LIVE IMPORT'} — ${new Date().toLocaleString()} ===\n`);

      let parsed;
      try {
        parsed = buildOrders();
      } catch (e) {
        appendLog('PARSE ERROR: ' + e.message, 'err');
        return;
      }

      parsed.log.forEach(l => appendLog(l, l.startsWith('  ✂') ? 'warn' : l.startsWith('  ⚠') ? 'warn' : ''));

      if (dryRun) {
        appendLog('\nDry run complete — no writes performed.', 'ok');
        return;
      }

      appendLog('\nWriting to Firestore…');
      let ok = 0, fail = 0;
      for (const order of parsed.orders) {
        try {
          const ref = await addDoc(collection(db, 'orders'), {
            playerName: order.playerName,
            orderedAt: serverTimestamp(),
            status: 'unassigned',
            assignedTo: null,
            assignedAt: null,
            potions: order.potions,
          });
          appendLog(`  ✓ ${order.playerName} → ${ref.id}`, 'ok');
          ok++;
        } catch (e) {
          appendLog(`  ✗ ${order.playerName}: ${e.message}`, 'err');
          fail++;
        }
      }
      appendLog(`\nDone — ${ok} imported, ${fail} failed.`, fail ? 'err' : 'ok');
    }

    document.getElementById('dry-btn').addEventListener('click', () => run(true));
    document.getElementById('run-btn').addEventListener('click', () => run(false));
  </script>
</body>
</html>
